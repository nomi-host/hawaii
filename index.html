/* ── localStorage ── */
function save(){try{localStorage.setItem('hw26',JSON.stringify({todos:todos,sects:sects,tr:tr,li:li,sn:sn}));}catch(e){}}
function load(){
  try{
    var d=JSON.parse(localStorage.getItem('hw26')||'null');
    if(!d)return;
    if(d.todos)todos=d.todos;
    if(d.sects)sects=d.sects;
    if(d.tr)tr=d.tr;
    if(d.li)li=d.li;
    if(d.sn)sn=d.sn;
  }catch(e){}}

function renderTabs(){
  var tabs=['🗓 일정','🎒 준비물','💰 예산','💡 팁'];
  document.getElementById('T').innerHTML=tabs.map(function(t,i){
    return '<button class="tbtn'+(TAB===i?' on':'')+'" onclick="setTab('+i+')">'+t+'</button>';
  }).join('');
}

/* ── schedule ── */
function scheduleHTML(){
  var h='<div class="gap">';
  h+='<div class="todo-card">'
    +'<div class="todo-lbl">예약 남은 것</div>'
    +'<div class="chips">'
    +todos.map(function(c,i){return '<span class="chip">'+esc(c)+'<span class="chip-del" onclick="delTodo('+i+')">✕</span></span>';}).join('')
    +'</div>'
    +'<div class="todo-add">'
    +'<input class="pack-input" id="tdInp" placeholder="항목 추가..." onkeydown="if(event.key===\'Enter\'){addTodo(this.value);this.value=\'\'}">'
    +'<button class="pack-addbtn" onclick="var e=document.getElementById(\'tdInp\');addTodo(e.value);e.value=\'\'">+ 추가</button>'
    +'</div>'
    +'</div>';
  h+='<div class="legend">'
    +'<span class="leg-item"><span class="leg-dot" style="background:#5BB8D4"></span> 주요</span>'
    +'<span class="leg-item"><span class="leg-dot" style="background:#F59E0B"></span> 쇼핑</span>'
    +'<span class="leg-item"><span class="leg-dot" style="background:#C5C5C5"></span> 복귀</span>'
    +'<span class="leg-item" style="margin-left:auto;font-size:9px">📍 이동거리</span>'
    +'</div>';
  SCHED.forEach(function(isle,ii){
    h+='<div class="isl-row"><span class="isl-pill" style="background:'+isle.pillBg+';color:'+isle.pillTxt+'">'+isle.island+'</span><div class="isl-rule"></div></div>';
    isle.days.forEach(function(day,di){
      var key=ii+'_'+di;
      var open=OPEN_DAYS[key]===true; /* 기본 닫힘 */
      var wea=day.weather?'<div class="dweather">'+day.weather.emoji+' '+esc(day.weather.desc)+'</div>':'';
      var body='';
      if(open){
        if(day.warn)body+='<div class="warn">'+esc(day.warn)+'</div>';
        day.acts.forEach(function(a){
          if(a.tran)body+='<div class="tran">📍 <span style="font-weight:500">'+esc(a.tran.dist)+' · '+esc(a.tran.time)+'</span></div>';
          var dc=a.type==='shop'?' shop':a.type==='main'?' blue':a.type==='ret'?' ret':'';
          body+='<div class="act"><div class="adot'+dc+'"></div><div class="abody">'
            +'<div class="atxt'+(a.type==='ret'?' ret-txt':'')+'">' +esc(a.t)+'</div>'
            +(a.info?'<div class="ainfo">'+esc(a.info)+'</div>':'')
            +(a.n?'<div class="anote">'+esc(a.n)+'</div>':'')
            +(a.park?'<div class="apark">'+esc(a.park)+'</div>':'')
            +'</div></div>';
        });
        if(day.opt2&&day.opt2.length){
          body+='<div class="opt-div">🧺 옵션 2 — 자연 & 피크닉 코스</div>';
          day.opt2.forEach(function(a){
            if(a.tran)body+='<div class="tran">📍 <span style="font-weight:500">'+esc(a.tran.dist)+' · '+esc(a.tran.time)+'</span></div>';
            var dc=a.type==='shop'?' shop':a.type==='main'?' blue':a.type==='ret'?' ret':'';
            body+='<div class="act"><div class="adot'+dc+'"></div><div class="abody">'              +'<div class="atxt'+(a.type==='ret'?' ret-txt':'')+'">' +esc(a.t)+'</div>'              +(a.info?'<div class="ainfo">'+esc(a.info)+'</div>':'')              +(a.n?'<div class="anote">'+esc(a.n)+'</div>':'')              +(a.park?'<div class="apark">'+esc(a.park)+'</div>':'')              +'</div></div>';
          });
        }
        if(day.rests&&day.rests.length){
          body+='<div class="rest-box"><div class="rlbl">근처 맛집</div>';
          day.rests.forEach(function(r){
            body+='<div class="rrow"><div><div class="rname">'+esc(r.name)+'</div><div class="rtype">'+esc(r.type)+'</div></div><a href="'+r.map+'" target="_blank" class="mbtn">지도 →</a></div>';
          });
          body+='</div>';
        }
      }
      h+='<div class="card">'
        +'<div class="dh" onclick="toggleDay(\''+key+'\')">'
        +'<div class="demo">'+day.emoji+'</div>'
        +'<div class="dm"><div class="dlbl">'+esc(day.date)+'</div>'
        +'<div class="dttl">'+esc(day.title)+'</div>'+wea+'</div>'
        +'<span class="chev'+(open?' op':'')+'">▼</span>'
        +'</div>'
        +(open?'<div class="dbody">'+body+'</div>':'')
        +'</div>';
    });
  });
  return h+'</div>';
}

/* ── packing ── */
function packingHTML(){
  var h='<div class="gap">';
  sects.forEach(function(s,si){
    var tot=0,dn=0;
    s.items.forEach(function(it){
      if(it.children){it.children.forEach(function(c){tot++;if(c.done)dn++;});}
      else{tot++;if(it.done)dn++;}
    });
    var bg=CAT_BG[s.cat]||'#fff';
    h+='<div class="psect" style="background:'+bg+'">'
      +'<div class="pshd"><div class="psttl">'+esc(s.cat)+'</div><div class="pcnt">'+dn+'/'+tot+'</div></div>';
    var grp=[];
    function flushGrp(){if(grp.length){h+='<div class="pgrid">'+grp.join('')+'</div>';grp=[];}}
    s.items.forEach(function(it,itemIdx){
      var cc="'"+s.cat+"'",ck="'"+it.id+"'";
      if(it.children!==undefined){
        flushGrp();
        var dc=it.children.filter(function(c){return c.done;}).length;
        h+='<div style="margin-bottom:5px">'          +'<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:rgba(0,0,0,0.08);border-radius:10px;cursor:pointer" onclick="toggleGrp('+cc+','+ck+')">'          +'<span style="font-size:10px;color:#111;display:inline-block;transform:'+(it.open!==false?'rotate(90deg)':'rotate(0deg)')+'">▶</span>'          +'<span style="font-size:12px;font-weight:700;color:#111;flex:1">'+esc(it.t)+'</span>'          +'<span style="font-size:10px;color:#9CA3AF">'+dc+'/'+it.children.length+'</span>'          +'</div>';
        if(it.open!==false){
          h+='<div style="padding-left:10px;padding-top:4px;display:flex;flex-direction:column;gap:4px">';
          it.children.forEach(function(c,ci){
            var cd="'"+c.id+"'";
            h+='<div class="pi'+(c.done?' done':'')+'" data-si="'+si+'" data-pii="'+itemIdx+'" data-cii="'+ci+'" style="border-radius:8px" onclick="chkChild('+cc+','+ck+','+cd+')">'
              +'<div class="picb">'+(c.done?'✓':'')+'</div>'

/* ── 터치 드래그 정렬 ── */
var _dg=null;
var _dgBlock=false;
function _startDrag(e,si,fromIdx,isChild,pii){
  e.stopPropagation();
  e.preventDefault();
  var _el=e.currentTarget?e.currentTarget.parentElement:null;
  var _t=e.touches&&e.touches[0]?e.touches[0]:null;
  if(!_el||!_t)return;
  var _tx=_t.clientX,_ty=_t.clientY;
  var active=true;
  var timer=setTimeout(function(){
    if(!active)return;
    _dgBlock=true;
    var rect=_el.getBoundingClientRect();
    var ghost=_el.cloneNode(true);
    ghost.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;z-index:9999;opacity:0.92;box-shadow:0 8px 24px rgba(0,0,0,.22);border-radius:10px;pointer-events:none;background:#fff;';
    document.body.appendChild(ghost);
    _el.style.opacity='0.25';
    _dg={si:si,from:fromIdx,to:fromIdx,el:_el,ghost:ghost,baseTop:rect.top,startY:_ty};
    document.addEventListener('touchmove',_dgMove,{passive:false});
    document.addEventListener('touchend',_dgEnd,{once:true});
  },250);
  var cancel=function(){active=false;clearTimeout(timer);};
  e.currentTarget.addEventListener('touchend',cancel,{once:true});
  e.currentTarget.addEventListener('touchmove',cancel,{once:true});
}
function piHold(e,si,ii){_startDrag(e,si,ii,false,null);}
function piChildHold(e,si,pii,ci){_startDrag(e,si,ci,true,pii);}
function _dgMove(e){
  if(!_dg)return;
  e.preventDefault();
  var t=e.touches[0];
  var dy=t.clientY-_dg.startY;
  _dg.ghost.style.top=(_dg.baseTop+dy)+'px';
  var gMid=_dg.baseTop+dy+(_dg.el.offsetHeight||40)/2;
  var sel=_dg.isChild
    ?'[data-si="'+_dg.si+'"][data-pii="'+_dg.pii+'"][data-cii]'
    :'[data-si="'+_dg.si+'"][data-ii]:not([data-pii])';
  var els=document.querySelectorAll(sel);
  var best=_dg.from,bestD=9999;
  els.forEach(function(el){
    var r=el.getBoundingClientRect();
    var d=Math.abs(r.top+r.height/2-gMid);
    if(d<bestD){bestD=d;best=+el.dataset[_dg.isChild?'cii':'ii'];}
  });
  if(best!==_dg.to){
    if(_dg._over)_dg._over.classList.remove('drag-over');
    _dg.to=best;
    var tsel=_dg.isChild
      ?'[data-si="'+_dg.si+'"][data-pii="'+_dg.pii+'"][data-cii="'+best+'"]'
      :'[data-si="'+_dg.si+'"][data-ii="'+best+'"]:not([data-pii])';
    var tgt=document.querySelector(tsel);
    if(tgt){tgt.classList.add('drag-over');_dg._over=tgt;}
  }
}
function _dgEnd(){
  if(!_dg)return;
  _dg.ghost.remove();
  _dg.el.classList.remove('dragging');
  _dg.el.style.opacity='';
  setTimeout(function(){_dgBlock=false;},50);
  if(_dg._over)_dg._over.classList.remove('drag-over');
  if(_dg.from!==_dg.to){
    var s=sects[_dg.si];
    if(s){
      if(_dg.isChild){
        var parent=s.items[_dg.pii];
        if(parent&&parent.children){
          var ch=parent.children.slice();
          var mv=ch.splice(_dg.from,1)[0];
          ch.splice(_dg.to,0,mv);
          sects[_dg.si].items[_dg.pii].children=ch;
          save();render();
        }
      } else {
        var items=s.items.slice();
        var mv=items.splice(_dg.from,1)[0];
        items.splice(_dg.to,0,mv);
        sects[_dg.si]={cat:s.cat,items:items};
        save();render();
      }
    }
  }
  document.removeEventListener('touchmove',_dgMove);
  _dg=null;
}
function addTodo(v){var t=(v||'').trim();if(!t)return;todos.push(t);save();render();}
function delTodo(i){todos.splice(i,1);save();render();}
function chkItem(cat,id){if(_dgBlock)return;sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===id?Object.assign({},it,{done:!it.done}):it;})}:s;});save();render();}
function delItem(cat,id){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.filter(function(it){return it.id!==id;})}:s;});save();render();}
function addItem(cat,val){var v=(val||'').trim();if(!v)return;var ni={t:v,id:'c_'+Date.now(),done:false,cust:true};sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.concat([ni])}:s;});save();render();}
function toggleGrp(cat,id){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===id?Object.assign({},it,{open:it.open===false?true:false}):it;})}:s;});render();}
function chkChild(cat,pid,cid){if(_dgBlock)return;sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===pid?Object.assign({},it,{children:it.children.map(function(c){return c.id===cid?Object.assign({},c,{done:!c.done}):c;})}):it;})}:s;});save();render();}
function delChild(cat,pid,cid){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===pid?Object.assign({},it,{children:it.children.filter(function(c){return c.id!==cid;})}):it;})}:s;});save();render();}
function editTip(cat,id){EDIT_TIP={cat:cat,id:id};render();}
function cancelTip(){EDIT_TIP=null;render();}
function saveTip(cat,id){var ta=document.getElementById('tta_'+id);if(!ta)return;var txt=ta.value;
  function upd(arr){return arr.map(function(i){return i.id===id?Object.assign({},i,{txt:txt}):i;});}
  if(cat==='tr')tr=upd(tr);else if(cat==='li')li=upd(li);else sn=upd(sn);
  save();EDIT_TIP=null;render();}
function delTip(cat,id){

  if(cat==='tr')tr=rm(tr);else if(cat==='li')li=rm(li);else sn=rm(sn);
  save();render();}

    navigator.serviceWorker.register('./sw.js')
      .then(function(){ console.log('SW 등록 완료 — 오프라인 사용 가능'); })
      .catch(function(e){ console.log('SW 등록 실패:', e); });
  });
}
</script>



<script>
(function(){
  var sy=0,top=false,threshold=90;
  var bar=document.getElementById('ptrBar');
  var toast=document.getElementById('ptrToast');
  document.addEventListener('touchstart',function(e){
    var st=window.pageYOffset||document.documentElement.scrollTop||document.body.scrollTop||0;
    top=(st<=0);
    sy=e.touches[0].pageY;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!top)return;
    var dy=e.touches[0].pageY-sy;
    if(dy>0&&bar){
      bar.style.transform='scaleX('+Math.min(dy/threshold,1)+')';
    }
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!bar)return;
    bar.style.transform='scaleX(0)';
    if(!top)return;
    var dy=e.changedTouches[0].pageY-sy;
    if(dy>=threshold){
      toast.classList.add('show');
      setTimeout(function(){location.reload();},600);
    }
  },{passive:true});
})();
</script>

</body>
</html>
