function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function linkify(s){return esc(s).replace(/https?:\/\/[^\s<]+/g,function(u){return '<a href="'+u+'" target="_blank">'+u+'</a>';});}
function keSVG(i){return '<svg viewBox="0 0 40 40" width="30" height="30" style="display:block"><circle cx="20" cy="20" r="20" fill="#003597"/><g transform="rotate(45 20 20)"><clipPath id="kc'+i+'"><circle cx="20" cy="20" r="17"/></clipPath><g clip-path="url(#kc'+i+')"><path fill="white" d="M20 3A17 17 0 0 1 20 37A8.5 8.5 0 0 1 20 20A8.5 8.5 0 0 0 20 3Z"/><circle cx="20" cy="11.5" r="4.2" fill="#003597"/><circle cx="20" cy="28.5" r="4.2" fill="white"/></g></g></svg>';}
function haSVG(i){var p=[0,72,144,216,288].map(function(a){return '<g transform="rotate('+a+' 20 21)"><ellipse cx="20" cy="12.5" rx="3.8" ry="7.2" fill="white" opacity=".9"/></g>';}).join('');return '<svg viewBox="0 0 40 40" width="30" height="30" style="display:block"><defs><radialGradient id="hg'+i+'" cx="35%" cy="28%" r="75%"><stop offset="0%" stop-color="#FF1B8D"/><stop offset="55%" stop-color="#7B2FBE"/><stop offset="100%" stop-color="#2A0EA0"/></radialGradient></defs><circle cx="20" cy="20" r="20" fill="url(#hg'+i+')"/>'+p+'<circle cx="20" cy="21" r="3.8" fill="white" opacity=".95"/><circle cx="20" cy="21" r="2.2" fill="#FF3D7F"/></svg>';}

/* ── localStorage ── */

function load(){
  try{
    var d=JSON.parse(localStorage.getItem('hw26')||'null');
    if(!d)return;
    if(d.todos)todos=d.todos;
    if(d.sects)sects=d.sects;
    if(d.tr)tr=d.tr;
    if(d.li)li=d.li;
    if(d.sn)sn=d.sn;
  }catch(e){}
}

/* ── packing ── */
function packingHTML(){
  var h='<div class="gap">';
  sects.forEach(function(s){
    var tot=0,dn=0;
    s.items.forEach(function(it){
      if(it.children){it.children.forEach(function(c){tot++;if(c.done)dn++;});}
      else{tot++;if(it.done)dn++;}
    });
    var bg=CAT_BG[s.cat]||'#fff';
    h+='<div class="psect" style="background:'+bg+'">'
      +'<div class="pshd"><div class="psttl">'+esc(s.cat)+'</div><div class="pcnt">'+dn+'/'+tot+'</div></div>';
    var grp=[];
    function flushGrp(){if(grp.length){h+='<div class="pgrid">'+grp.join('')+'</div>';grp=[];}}
    s.items.forEach(function(it){
      var cc=JSON.stringify(s.cat),ck=JSON.stringify(it.id);
      if(it.children!==undefined){
        flushGrp();
        var dc=it.children.filter(function(c){return c.done;}).length;
        h+='<div style="margin-bottom:5px">'
          +'<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:#EEF3FF;border-radius:10px;cursor:pointer" onclick="toggleGrp('+cc+','+ck+')">'
          +'<span style="font-size:10px;color:#0066FF;display:inline-block;transform:'+(it.open!==false?'rotate(90deg)':'rotate(0deg)')+'">▶</span>'
          +'<span style="font-size:12px;font-weight:700;color:#0066FF;flex:1">'+esc(it.t)+'</span>'
          +'<span style="font-size:10px;color:#9CA3AF">'+dc+'/'+it.children.length+'</span>'
          +'</div>';
        if(it.open!==false){
          h+='<div style="padding-left:10px;padding-top:4px;display:flex;flex-direction:column;gap:4px">';
          it.children.forEach(function(c){
            var cd=JSON.stringify(c.id);
            h+='<div class="pi'+(c.done?' done':'')+'" style="border-radius:8px" onclick="chkChild('+cc+','+ck+','+cd+')">'
              +'<div class="picb">'+(c.done?'✓':'')+'</div>'
              +'<div class="pitxt">'+esc(c.t)+'</div>'
              +'<span class="pi-del" onclick="event.stopPropagation();delChild('+cc+','+ck+','+cd+')">✕</span>'
              +'</div>';
          });
          h+='</div>';
        }
        h+='</div>';
      } else {
        grp.push('<div class="pi'+(it.done?' done':'')+'" onclick="chkItem('+cc+','+ck+')">'
          +'<div class="picb">'+(it.done?'✓':'')+'</div>'
          +'<div class="pitxt">'+esc(it.t)+'</div>'
          +'<span class="pi-del" onclick="event.stopPropagation();delItem('+cc+','+ck+')">✕</span>'
          +'</div>');
      }
    });
    flushGrp();
    var sid='pi_'+s.cat.replace(/\W/g,'_');
    h+='<div class="pack-add">'
      +'<input class="pack-input" id="'+sid+'" placeholder="항목 추가..." onkeydown="if(event.key===\'Enter\'){addItem('+JSON.stringify(s.cat)+',this.value);this.value=\'\'}">'
      +'<button class="pack-addbtn" onclick="var el=document.getElementById(\''+sid+'\');addItem('+JSON.stringify(s.cat)+',el.value);el.value=\'\'">+ 추가</button>'
      +'</div>';
    h+='</div>';
  });
  h+='<div style="font-size:10px;color:#9CA3AF;padding:0 4px 8px">탭 = 체크/해제 · ✕ = 삭제</div>';
  return h+'</div>';
}

/* ── render ── */
function render(){
  var c=document.getElementById('C');
  if(TAB===0)c.innerHTML=scheduleHTML();
  else if(TAB===1)c.innerHTML=packingHTML();
  else if(TAB===2)c.innerHTML=budgetHTML();
  else c.innerHTML=tipsHTML();
  renderTabs();
  if(EDIT_TIP){var ta=document.getElementById('tta_'+EDIT_TIP.id);if(ta)ta.focus();}
}

/* ── handlers ── */
function setTab(i){TAB=i;EDIT_TIP=null;render();}
function toggleDay(k){OPEN_DAYS[k]=OPEN_DAYS[k]===true?false:true;render();}
function toggleTip(k){OPEN_TIPS[k]=OPEN_TIPS[k]?0:1;render();}
function addTodo(v){var t=(v||'').trim();if(!t)return;todos.push(t);save();render();}
function delTodo(i){todos.splice(i,1);save();render();}
function chkItem(cat,id){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===id?Object.assign({},it,{done:!it.done}):it;})}:s;});save();render();}
function delItem(cat,id){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.filter(function(it){return it.id!==id;})}:s;});save();render();}
function addItem(cat,val){var v=(val||'').trim();if(!v)return;var ni={t:v,id:'c_'+Date.now(),done:false,cust:true};sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.concat([ni])}:s;});save();render();}
function toggleGrp(cat,id){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===id?Object.assign({},it,{open:it.open===false?true:false}):it;})}:s;});render();}
function chkChild(cat,pid,cid){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===pid?Object.assign({},it,{children:it.children.map(function(c){return c.id===cid?Object.assign({},c,{done:!c.done}):c;})}):it;})}:s;});save();render();}
function delChild(cat,pid,cid){sects=sects.map(function(s){return s.cat===cat?{cat:s.cat,items:s.items.map(function(it){return it.id===pid?Object.assign({},it,{children:it.children.filter(function(c){return c.id!==cid;})}):it;})}:s;});save();render();}
function editTip(cat,id){EDIT_TIP={cat:cat,id:id};render();}
function cancelTip(){EDIT_TIP=null;render();}
function saveTip(cat,id){var ta=document.getElementById('tta_'+id);if(!ta)return;var txt=ta.value;
  function upd(arr){return arr.map(function(i){return i.id===id?Object.assign({},i,{txt:txt}):i;});}
  if(cat==='tr')tr=upd(tr);else if(cat==='li')li=upd(li);else sn=upd(sn);
  save();EDIT_TIP=null;render();}
function delTip(cat,id){
  function rm(arr){return arr.filter(function(i){return i.id!==id;});}
  if(cat==='tr')tr=rm(tr);else if(cat==='li')li=rm(li);else sn=rm(sn);
  save();render();}
